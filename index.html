<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxAppCanada (TAC) - Advanced Payroll Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); }
        input::-webkit-inner-spin-button { display: none; }
        .config-input { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; padding: 0.5rem; font-size: 0.875rem; font-family: ui-monospace, monospace; color: inherit; outline: none; }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #a855f7); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
        #setupWizard { transition: opacity 0.5s ease-in-out; }
        .locked { filter: blur(25px); pointer-events: none; }
        .choice-btn { @apply w-full text-left p-4 bg-slate-950 border border-slate-800 rounded-2xl hover:border-blue-500 hover:bg-blue-500/5 transition-all flex items-center justify-between; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans selection:bg-blue-500/30">

    <div id="setupWizard" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div id="wizardContent" class="space-y-6 relative z-10"></div>
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 blur-3xl rounded-full"></div>
        </div>
    </div>

    <div id="mainContent" class="locked transition-all duration-700">
        <nav class="p-6 border-b border-slate-800 flex justify-between items-center glass sticky top-0 z-50">
            <h1 class="text-2xl font-black tracking-tighter">
                TAXAPP<span class="gradient-text">CANADA</span>
                <span class="text-[10px] font-mono text-slate-500 ml-2 uppercase">TAC v2026.1</span>
            </h1>
            <div class="flex gap-3">
                <button onclick="resetProfile()" class="text-[10px] uppercase font-bold text-slate-500 hover:text-rose-400 transition-colors">Reset Profile</button>
                <button id="settingsBtn" class="bg-slate-800 hover:bg-slate-700 p-2 px-4 rounded-xl transition-all border border-slate-700 text-sm font-medium">
                    <i class="fa-solid fa-sliders mr-2"></i> Parameters
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 block">Calculated Gross Salary</label>
                    <div id="displayGross" class="text-4xl font-mono text-white mb-6">$0.00</div>
                    <div class="h-px bg-slate-800 mb-6"></div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Net Annual Take Home</label>
                    <div id="displayNet" class="text-5xl font-mono font-black text-green-400 tracking-tighter">$0.00</div>
                </div>
                <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl">
                    <h3 class="text-blue-400 font-bold uppercase text-[10px] tracking-widest mb-2">Bracket Safety Buffer</h3>
                    <div class="flex items-baseline gap-2">
                        <span id="otHours" class="text-6xl font-mono font-bold text-white">0</span>
                        <span class="text-slate-500 text-sm font-bold uppercase">OT Hours Left</span>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2 bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                <h2 class="text-lg font-bold mb-6">Deductions & Benefits Breakdown</h2>
                <div id="breakdownList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
